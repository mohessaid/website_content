name: Notify codebase

on:
  push:
    branches: [ main ]

jobs:
  dispatch-update:
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          repository: mohessaid/mohessaid
          event-type: content-updated
          token: ${{ secrets.CONTENT_DISPATCH_TOKEN }}

